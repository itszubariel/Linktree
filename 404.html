<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
font-family:Inter,sans-serif;
color:#e4e4e7;

background:
radial-gradient(circle at 20% 30%, rgba(124,58,237,0.18), transparent 60%),
radial-gradient(circle at 80% 70%, rgba(124,58,237,0.12), transparent 60%),
linear-gradient(180deg,#020202,#07030f,#020202);
}

/* 404 text */

.error{
font-size:11rem;
font-weight:800;
letter-spacing:-6px;

background:linear-gradient(
270deg,
#7c3aed,
#5b21b6,
#8b5cf6,
#5b21b6
);

background-size:800% 800%;
-webkit-background-clip:text;
background-clip:text;
-webkit-text-fill-color:transparent;

animation:gradientMove 10s ease infinite;
}

/* animation */

@keyframes gradientMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* description */

.message{
margin-top:10px;
font-size:0.9rem;
color:#a1a1aa;
max-width:420px;
}

/* buttons */

.buttons{
margin-top:35px;
display:flex;
gap:14px;
}

.btn{
padding:11px 26px;
border-radius:8px;
text-decoration:none;
font-weight:600;
font-size:0.9rem;
transition:all .25s ease;
cursor:pointer;
}

/* primary */

.btn-home{
background:linear-gradient(135deg,#7c3aed,#4c1d95);
color:white;
}

.btn-home:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(124,58,237,0.4);
}

/* secondary */

.btn-back{
border:1px solid rgba(255,255,255,0.1);
color:#e4e4e7;
background:rgba(255,255,255,0.03);
}

.btn-back:hover{
background:rgba(255,255,255,0.08);
transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="error">404</div>

<div class="message">
Whoops! This page seems to have disappeared into the void.
</div>

<div class="buttons">
<a href="/" class="btn btn-home">Go Home</a>
<button onclick="history.back()" class="btn btn-back">Go Back</button>
</div>

</body>
</html>
